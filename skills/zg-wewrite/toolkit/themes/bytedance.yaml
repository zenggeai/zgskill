name: "bytedance"
description: "字节跳动风：白底品牌蓝，现代无衬线，大间距，适合科技产品内容"
colors:
  primary: "#1966FF"
  secondary: "#4e8fff"
  text: "#1f2329"
  text_light: "#646a73"
  background: "#ffffff"
  code_bg: "#f5f6f7"
  code_color: "#1966FF"
  quote_border: "#1966FF"
  quote_bg: "#f0f5ff"
  border_radius: "8px"
darkmode:
  background: "#1a1a1a"
  text: "#e8e8e8"
  text_light: "#a0a0a0"
  primary: "#4e8fff"
  code_bg: "#2a2a2a"
  code_color: "#6ea8fe"
  quote_bg: "#1e2a3a"
  quote_border: "#4e8fff"
base_css: |
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    font-size: 16px;
    line-height: 2;
    color: #1f2329;
    background: #ffffff;
    max-width: 720px;
    margin: 0 auto;
    padding: 24px;
    word-wrap: break-word;
    letter-spacing: 0.02em;
  }

  h1 {
    font-size: 28px;
    font-weight: 800;
    color: #1f2329;
    margin: 40px 0 20px 0;
    padding-bottom: 14px;
    border-bottom: 3px solid #1966FF;
    line-height: 1.4;
    letter-spacing: -0.01em;
  }

  h2 {
    font-size: 22px;
    font-weight: 700;
    color: #1f2329;
    margin: 36px 0 16px 0;
    padding: 10px 0 10px 14px;
    border-left: 4px solid #1966FF;
    line-height: 1.4;
  }

  h3 {
    font-size: 18px;
    font-weight: 600;
    color: #1966FF;
    margin: 28px 0 14px 0;
    line-height: 1.4;
  }

  h4 {
    font-size: 16px;
    font-weight: 600;
    color: #1f2329;
    margin: 24px 0 12px 0;
    line-height: 1.4;
  }

  p {
    font-size: 16px;
    line-height: 2;
    color: #1f2329;
    margin: 16px 0;
  }

  strong {
    font-weight: 700;
    color: #1966FF;
  }

  em {
    font-style: italic;
    color: #646a73;
  }

  code {
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, Courier, monospace;
    font-size: 14px;
    background: #f5f6f7;
    color: #1966FF;
    padding: 2px 8px;
    border-radius: 4px;
  }

  pre {
    background: #f5f6f7;
    color: #1f2329;
    padding: 20px;
    border-radius: 8px;
    overflow-x: auto;
    margin: 20px 0;
    line-height: 1.6;
    border: 1px solid #e5e6e8;
  }

  pre code {
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, Courier, monospace;
    font-size: 14px;
    background: none;
    color: #1f2329;
    padding: 0;
    border-radius: 0;
  }

  blockquote {
    border-left: 4px solid #1966FF;
    background: #f0f5ff;
    margin: 20px 0;
    padding: 16px 20px;
    border-radius: 0 8px 8px 0;
    color: #1f2329;
  }

  blockquote p {
    margin: 8px 0;
    color: #1f2329;
  }

  ul {
    padding-left: 28px;
    margin: 16px 0;
  }

  ol {
    padding-left: 28px;
    margin: 16px 0;
  }

  li {
    font-size: 16px;
    line-height: 2;
    color: #1f2329;
    margin: 8px 0;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin: 20px 0;
    font-size: 15px;
  }

  thead {
    background: #1966FF;
  }

  th {
    background: #1966FF;
    color: #ffffff;
    font-weight: 600;
    padding: 12px 16px;
    text-align: left;
    border: 1px solid #1966FF;
  }

  td {
    padding: 12px 16px;
    border: 1px solid #e5e6e8;
    color: #1f2329;
  }

  tr {
    background: #ffffff;
  }

  img {
    max-width: 100%;
    height: auto;
    display: block;
    margin: 28px auto;
    border-radius: 8px;
  }

  a {
    color: #1966FF;
    text-decoration: none;
    font-weight: 500;
  }

  hr {
    border: none;
    border-top: 1px solid #e5e6e8;
    margin: 32px 0;
  }

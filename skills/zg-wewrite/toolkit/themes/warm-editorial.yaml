name: "warm-editorial"
description: "暖色编辑风格，适合生活方式和文化类内容"
colors:
  primary: "#d97706"
  secondary: "#ea580c"
  text: "#333333"
  text_light: "#666666"
  background: "#ffffff"
  code_bg: "#fef3c7"
  code_color: "#92400e"
  quote_border: "#d97706"
  quote_bg: "#fffbeb"
  border_radius: "8px"
  darkmode:
    background: "#1e1e1e"
    text: "#d4c8b8"
    text_light: "#a09080"
    primary: "#f0a830"
    code_bg: "#2a2520"
    code_color: "#d4b896"
    quote_bg: "#2a2418"
    quote_border: "#d97706"
base_css: |
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    font-size: 16px;
    line-height: 1.8;
    color: #333333;
    background: #ffffff;
    max-width: 720px;
    margin: 0 auto;
    padding: 20px;
    word-wrap: break-word;
  }

  h1 {
    font-size: 26px;
    font-weight: 700;
    color: #1a1a1a;
    margin: 32px 0 16px 0;
    padding-bottom: 12px;
    border-bottom: 2px solid #d97706;
    line-height: 1.4;
  }

  h2 {
    font-size: 22px;
    font-weight: 700;
    color: #1a1a1a;
    margin: 28px 0 14px 0;
    padding: 8px 0 8px 12px;
    border-left: 4px solid #d97706;
    line-height: 1.4;
  }

  h3 {
    font-size: 18px;
    font-weight: 600;
    color: #92400e;
    margin: 24px 0 12px 0;
    line-height: 1.4;
  }

  h4 {
    font-size: 16px;
    font-weight: 600;
    color: #92400e;
    margin: 20px 0 10px 0;
    line-height: 1.4;
  }

  p {
    font-size: 16px;
    line-height: 1.8;
    color: #333333;
    margin: 12px 0;
  }

  strong {
    font-weight: 700;
    color: #92400e;
  }

  em {
    font-style: italic;
    color: #333333;
  }

  code {
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, Courier, monospace;
    font-size: 14px;
    background: #fef3c7;
    color: #92400e;
    padding: 2px 6px;
    border-radius: 4px;
  }

  pre {
    background: #fef3c7;
    color: #92400e;
    padding: 16px;
    border-radius: 8px;
    overflow-x: auto;
    margin: 16px 0;
    line-height: 1.6;
    border: 1px solid #fde68a;
  }

  pre code {
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, Courier, monospace;
    font-size: 14px;
    background: none;
    color: #92400e;
    padding: 0;
    border-radius: 0;
  }

  blockquote {
    border-left: 4px solid #d97706;
    background: #fffbeb;
    margin: 16px 0;
    padding: 12px 16px;
    border-radius: 0 8px 8px 0;
    color: #333333;
  }

  blockquote p {
    margin: 8px 0;
    color: #333333;
  }

  ul {
    padding-left: 24px;
    margin: 12px 0;
  }

  ol {
    padding-left: 24px;
    margin: 12px 0;
  }

  li {
    font-size: 16px;
    line-height: 1.8;
    color: #333333;
    margin: 6px 0;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin: 16px 0;
    font-size: 15px;
  }

  thead {
    background: #d97706;
  }

  th {
    background: #d97706;
    color: #ffffff;
    font-weight: 600;
    padding: 10px 14px;
    text-align: left;
    border: 1px solid #d97706;
  }

  td {
    padding: 10px 14px;
    border: 1px solid #fde68a;
    color: #333333;
  }

  tr {
    background: #ffffff;
  }

  img {
    max-width: 100%;
    height: auto;
    display: block;
    margin: 24px auto;
    border-radius: 8px;
  }

  a {
    color: #d97706;
    text-decoration: none;
    font-weight: 500;
  }

  hr {
    border: none;
    border-top: 1px solid #fde68a;
    margin: 24px 0;
  }

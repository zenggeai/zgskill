name: "bold-navy"
description: "大胆藏青风格：白底藏青主色，稳重专业，适合金融商务和行业分析内容"
colors:
  primary: "#1e3a5f"
  secondary: "#2c5282"
  text: "#1a1a2e"
  text_light: "#4a5568"
  background: "#ffffff"
  code_bg: "#f0f4f8"
  code_color: "#1e3a5f"
  quote_border: "#1e3a5f"
  quote_bg: "#f0f4f8"
  border_radius: "6px"
darkmode:
  background: "#0a0f1a"
  text: "#d8dce8"
  text_light: "#8890a0"
  primary: "#5b8cc8"
  code_bg: "#141a28"
  code_color: "#7ca8e0"
  quote_bg: "#101828"
  quote_border: "#5b8cc8"
base_css: |
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    font-size: 16px;
    line-height: 1.8;
    color: #1a1a2e;
    background: #ffffff;
    max-width: 720px;
    margin: 0 auto;
    padding: 20px;
    word-wrap: break-word;
  }

  h1 {
    font-size: 26px;
    font-weight: 700;
    color: #1e3a5f;
    margin: 32px 0 16px 0;
    padding-bottom: 12px;
    border-bottom: 3px solid #1e3a5f;
    line-height: 1.4;
  }

  h2 {
    font-size: 22px;
    font-weight: 700;
    color: #1e3a5f;
    margin: 28px 0 14px 0;
    padding: 8px 0 8px 12px;
    border-left: 4px solid #1e3a5f;
    border-bottom: 1px solid #e2e8f0;
    line-height: 1.4;
  }

  h3 {
    font-size: 18px;
    font-weight: 600;
    color: #2c5282;
    margin: 24px 0 12px 0;
    line-height: 1.4;
  }

  h4 {
    font-size: 16px;
    font-weight: 600;
    color: #1a1a2e;
    margin: 20px 0 10px 0;
    line-height: 1.4;
  }

  p {
    font-size: 16px;
    line-height: 1.8;
    color: #1a1a2e;
    margin: 12px 0;
  }

  strong {
    font-weight: 700;
    color: #1e3a5f;
  }

  em {
    font-style: italic;
    color: #4a5568;
  }

  code {
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, Courier, monospace;
    font-size: 14px;
    background: #f0f4f8;
    color: #1e3a5f;
    padding: 2px 6px;
    border-radius: 4px;
  }

  pre {
    background: #1e3a5f;
    color: #e2e8f0;
    padding: 16px;
    border-radius: 6px;
    overflow-x: auto;
    margin: 16px 0;
    line-height: 1.6;
  }

  pre code {
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, Courier, monospace;
    font-size: 14px;
    background: none;
    color: #e2e8f0;
    padding: 0;
    border-radius: 0;
  }

  blockquote {
    border-left: 4px solid #1e3a5f;
    background: #f0f4f8;
    margin: 16px 0;
    padding: 12px 16px;
    border-radius: 0 6px 6px 0;
    color: #2c5282;
  }

  blockquote p {
    margin: 8px 0;
    color: #2c5282;
  }

  ul {
    padding-left: 24px;
    margin: 12px 0;
  }

  ol {
    padding-left: 24px;
    margin: 12px 0;
  }

  li {
    font-size: 16px;
    line-height: 1.8;
    color: #1a1a2e;
    margin: 6px 0;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin: 16px 0;
    font-size: 15px;
  }

  thead {
    background: #1e3a5f;
  }

  th {
    background: #1e3a5f;
    color: #ffffff;
    font-weight: 600;
    padding: 10px 14px;
    text-align: left;
    border: 1px solid #1e3a5f;
  }

  td {
    padding: 10px 14px;
    border: 1px solid #e2e8f0;
    color: #1a1a2e;
  }

  tr {
    background: #ffffff;
  }

  img {
    max-width: 100%;
    height: auto;
    display: block;
    margin: 24px auto;
    border-radius: 6px;
  }

  a {
    color: #2c5282;
    text-decoration: none;
    font-weight: 500;
  }

  hr {
    border: none;
    border-top: 2px solid #e2e8f0;
    margin: 24px 0;
  }

name: "focus-red"
description: "聚焦红风格：白底中国红标题和引用边框，醒目有力，适合新闻评论和观点输出"
colors:
  primary: "#dc2626"
  secondary: "#ef4444"
  text: "#1a1a1a"
  text_light: "#555555"
  background: "#ffffff"
  code_bg: "#fef2f2"
  code_color: "#b91c1c"
  quote_border: "#dc2626"
  quote_bg: "#fef2f2"
  border_radius: "6px"
darkmode:
  background: "#1a0f0f"
  text: "#e8d8d8"
  text_light: "#a08888"
  primary: "#f87171"
  code_bg: "#2a1515"
  code_color: "#fca5a5"
  quote_bg: "#221010"
  quote_border: "#f87171"
base_css: |
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    font-size: 16px;
    line-height: 1.8;
    color: #1a1a1a;
    background: #ffffff;
    max-width: 720px;
    margin: 0 auto;
    padding: 20px;
    word-wrap: break-word;
  }

  h1 {
    font-size: 26px;
    font-weight: 800;
    color: #dc2626;
    margin: 32px 0 16px 0;
    padding-bottom: 12px;
    border-bottom: 3px solid #dc2626;
    line-height: 1.4;
  }

  h2 {
    font-size: 22px;
    font-weight: 700;
    color: #dc2626;
    margin: 28px 0 14px 0;
    padding: 8px 0 8px 12px;
    border-left: 4px solid #dc2626;
    line-height: 1.4;
  }

  h3 {
    font-size: 18px;
    font-weight: 600;
    color: #1a1a1a;
    margin: 24px 0 12px 0;
    line-height: 1.4;
  }

  h4 {
    font-size: 16px;
    font-weight: 600;
    color: #1a1a1a;
    margin: 20px 0 10px 0;
    line-height: 1.4;
  }

  p {
    font-size: 16px;
    line-height: 1.8;
    color: #1a1a1a;
    margin: 12px 0;
  }

  strong {
    font-weight: 700;
    color: #dc2626;
  }

  em {
    font-style: italic;
    color: #555555;
  }

  code {
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, Courier, monospace;
    font-size: 14px;
    background: #fef2f2;
    color: #b91c1c;
    padding: 2px 6px;
    border-radius: 4px;
  }

  pre {
    background: #fef2f2;
    color: #1a1a1a;
    padding: 16px;
    border-radius: 6px;
    overflow-x: auto;
    margin: 16px 0;
    line-height: 1.6;
    border: 1px solid #fecaca;
  }

  pre code {
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, Courier, monospace;
    font-size: 14px;
    background: none;
    color: #1a1a1a;
    padding: 0;
    border-radius: 0;
  }

  blockquote {
    border-left: 4px solid #dc2626;
    background: #fef2f2;
    margin: 16px 0;
    padding: 12px 16px;
    border-radius: 0 6px 6px 0;
    color: #333333;
  }

  blockquote p {
    margin: 8px 0;
    color: #333333;
  }

  ul {
    padding-left: 24px;
    margin: 12px 0;
  }

  ol {
    padding-left: 24px;
    margin: 12px 0;
  }

  li {
    font-size: 16px;
    line-height: 1.8;
    color: #1a1a1a;
    margin: 6px 0;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin: 16px 0;
    font-size: 15px;
  }

  thead {
    background: #dc2626;
  }

  th {
    background: #dc2626;
    color: #ffffff;
    font-weight: 700;
    padding: 10px 14px;
    text-align: left;
    border: 1px solid #dc2626;
  }

  td {
    padding: 10px 14px;
    border: 1px solid #e5e7eb;
    color: #1a1a1a;
  }

  tr {
    background: #ffffff;
  }

  img {
    max-width: 100%;
    height: auto;
    display: block;
    margin: 24px auto;
    border-radius: 6px;
  }

  a {
    color: #dc2626;
    text-decoration: none;
    font-weight: 500;
  }

  hr {
    border: none;
    border-top: 2px solid #fecaca;
    margin: 24px 0;
  }

name: "professional-clean"
description: "干净专业的企业公众号风格，适合大多数商业内容"
colors:
  primary: "#2563eb"
  secondary: "#3b82f6"
  text: "#333333"
  text_light: "#666666"
  background: "#ffffff"
  code_bg: "#1e293b"
  code_color: "#e2e8f0"
  quote_border: "#2563eb"
  quote_bg: "#eff6ff"
  border_radius: "8px"
  darkmode:
    background: "#1e1e1e"
    text: "#c8c8c8"
    text_light: "#999999"
    primary: "#6aadff"
    code_bg: "#2d2d2d"
    code_color: "#d4d4d4"
    quote_bg: "#252525"
    quote_border: "#4a90d9"
base_css: |
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    font-size: 16px;
    line-height: 1.8;
    color: #333333;
    background: #ffffff;
    max-width: 720px;
    margin: 0 auto;
    padding: 20px;
    word-wrap: break-word;
  }

  h1 {
    font-size: 26px;
    font-weight: 700;
    color: #1a1a1a;
    margin: 32px 0 16px 0;
    padding-bottom: 12px;
    border-bottom: 2px solid #2563eb;
    line-height: 1.4;
  }

  h2 {
    font-size: 22px;
    font-weight: 700;
    color: #1a1a1a;
    margin: 28px 0 14px 0;
    padding: 8px 0 8px 12px;
    border-left: 4px solid #2563eb;
    border-bottom: 1px solid #e5e7eb;
    line-height: 1.4;
  }

  h3 {
    font-size: 18px;
    font-weight: 600;
    color: #333333;
    margin: 24px 0 12px 0;
    line-height: 1.4;
  }

  h4 {
    font-size: 16px;
    font-weight: 600;
    color: #333333;
    margin: 20px 0 10px 0;
    line-height: 1.4;
  }

  p {
    font-size: 16px;
    line-height: 1.8;
    color: #333333;
    margin: 12px 0;
  }

  strong {
    font-weight: 700;
    color: #1a1a1a;
  }

  em {
    font-style: italic;
    color: #333333;
  }

  code {
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, Courier, monospace;
    font-size: 14px;
    background: #f1f5f9;
    color: #d946ef;
    padding: 2px 6px;
    border-radius: 4px;
  }

  pre {
    background: #1e293b;
    color: #e2e8f0;
    padding: 16px;
    border-radius: 8px;
    overflow-x: auto;
    margin: 16px 0;
    line-height: 1.6;
  }

  pre code {
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, Courier, monospace;
    font-size: 14px;
    background: none;
    color: #e2e8f0;
    padding: 0;
    border-radius: 0;
  }

  blockquote {
    border-left: 4px solid #2563eb;
    background: #eff6ff;
    margin: 16px 0;
    padding: 12px 16px;
    border-radius: 0 8px 8px 0;
    color: #333333;
  }

  blockquote p {
    margin: 8px 0;
    color: #333333;
  }

  ul {
    padding-left: 24px;
    margin: 12px 0;
  }

  ol {
    padding-left: 24px;
    margin: 12px 0;
  }

  li {
    font-size: 16px;
    line-height: 1.8;
    color: #333333;
    margin: 6px 0;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin: 16px 0;
    font-size: 15px;
  }

  thead {
    background: #2563eb;
  }

  th {
    background: #2563eb;
    color: #ffffff;
    font-weight: 600;
    padding: 10px 14px;
    text-align: left;
    border: 1px solid #2563eb;
  }

  td {
    padding: 10px 14px;
    border: 1px solid #e5e7eb;
    color: #333333;
  }

  tr {
    background: #ffffff;
  }

  img {
    max-width: 100%;
    height: auto;
    display: block;
    margin: 24px auto;
    border-radius: 8px;
  }

  a {
    color: #2563eb;
    text-decoration: none;
    font-weight: 500;
  }

  hr {
    border: none;
    border-top: 1px solid #e5e7eb;
    margin: 24px 0;
  }

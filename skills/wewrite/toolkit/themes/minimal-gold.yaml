name: "minimal-gold"
description: "极简金色风格：白底金色细线点缀，奢华但克制，适合高端品牌和精品内容"
colors:
  primary: "#b8860b"
  secondary: "#d4a843"
  text: "#2a2a2a"
  text_light: "#6b6b6b"
  background: "#ffffff"
  code_bg: "#faf8f3"
  code_color: "#8b6914"
  quote_border: "#b8860b"
  quote_bg: "#fdfbf5"
  border_radius: "4px"
darkmode:
  background: "#141210"
  text: "#e0dcd0"
  text_light: "#9a9488"
  primary: "#d4a843"
  code_bg: "#1e1c18"
  code_color: "#e0c060"
  quote_bg: "#1a1810"
  quote_border: "#d4a843"
base_css: |
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    font-size: 16px;
    line-height: 1.8;
    color: #2a2a2a;
    background: #ffffff;
    max-width: 720px;
    margin: 0 auto;
    padding: 20px;
    word-wrap: break-word;
    letter-spacing: 0.01em;
  }

  h1 {
    font-size: 26px;
    font-weight: 600;
    color: #2a2a2a;
    margin: 36px 0 18px 0;
    text-align: center;
    padding-bottom: 14px;
    border-bottom: 1px solid #b8860b;
    line-height: 1.4;
    letter-spacing: 0.05em;
  }

  h2 {
    font-size: 21px;
    font-weight: 600;
    color: #2a2a2a;
    margin: 30px 0 14px 0;
    padding-bottom: 8px;
    border-bottom: 1px solid #d4c59a;
    line-height: 1.4;
  }

  h3 {
    font-size: 18px;
    font-weight: 600;
    color: #b8860b;
    margin: 24px 0 12px 0;
    line-height: 1.4;
  }

  h4 {
    font-size: 16px;
    font-weight: 600;
    color: #2a2a2a;
    margin: 20px 0 10px 0;
    line-height: 1.4;
  }

  p {
    font-size: 16px;
    line-height: 1.8;
    color: #2a2a2a;
    margin: 12px 0;
  }

  strong {
    font-weight: 700;
    color: #b8860b;
  }

  em {
    font-style: italic;
    color: #6b6b6b;
  }

  code {
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, Courier, monospace;
    font-size: 14px;
    background: #faf8f3;
    color: #8b6914;
    padding: 2px 6px;
    border-radius: 4px;
  }

  pre {
    background: #faf8f3;
    color: #2a2a2a;
    padding: 16px;
    border-radius: 4px;
    overflow-x: auto;
    margin: 16px 0;
    line-height: 1.6;
    border: 1px solid #e8e0c8;
  }

  pre code {
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, Courier, monospace;
    font-size: 14px;
    background: none;
    color: #2a2a2a;
    padding: 0;
    border-radius: 0;
  }

  blockquote {
    border-left: 2px solid #b8860b;
    background: #fdfbf5;
    margin: 16px 0;
    padding: 12px 16px;
    border-radius: 0 4px 4px 0;
    color: #6b6b6b;
  }

  blockquote p {
    margin: 8px 0;
    color: #6b6b6b;
  }

  ul {
    padding-left: 24px;
    margin: 12px 0;
  }

  ol {
    padding-left: 24px;
    margin: 12px 0;
  }

  li {
    font-size: 16px;
    line-height: 1.8;
    color: #2a2a2a;
    margin: 6px 0;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin: 16px 0;
    font-size: 15px;
  }

  thead {
    background: #2a2a2a;
  }

  th {
    background: #2a2a2a;
    color: #d4a843;
    font-weight: 600;
    padding: 10px 14px;
    text-align: left;
    border: 1px solid #2a2a2a;
    letter-spacing: 0.03em;
  }

  td {
    padding: 10px 14px;
    border: 1px solid #e8e0c8;
    color: #2a2a2a;
  }

  tr {
    background: #ffffff;
  }

  img {
    max-width: 100%;
    height: auto;
    display: block;
    margin: 24px auto;
    border-radius: 4px;
  }

  a {
    color: #b8860b;
    text-decoration: none;
    font-weight: 500;
  }

  hr {
    border: none;
    border-top: 1px solid #d4c59a;
    margin: 28px auto;
    width: 40%;
  }

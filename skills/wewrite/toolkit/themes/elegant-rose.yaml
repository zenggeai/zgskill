name: "elegant-rose"
description: "优雅玫瑰风格：浅粉底玫瑰色点缀，温柔精致，适合女性生活和时尚内容"
colors:
  primary: "#be185d"
  secondary: "#db2777"
  text: "#3d1f2e"
  text_light: "#7a5068"
  background: "#fdf2f8"
  code_bg: "#fce7f3"
  code_color: "#be185d"
  quote_border: "#be185d"
  quote_bg: "#fce7f3"
  border_radius: "12px"
darkmode:
  background: "#1a0f14"
  text: "#e8d0dc"
  text_light: "#a07888"
  primary: "#f472b6"
  code_bg: "#2a1520"
  code_color: "#f9a8d4"
  quote_bg: "#221018"
  quote_border: "#f472b6"
base_css: |
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    font-size: 16px;
    line-height: 1.85;
    color: #3d1f2e;
    background: #fdf2f8;
    max-width: 720px;
    margin: 0 auto;
    padding: 20px;
    word-wrap: break-word;
  }

  h1 {
    font-size: 26px;
    font-weight: 700;
    color: #be185d;
    margin: 32px 0 16px 0;
    text-align: center;
    padding-bottom: 12px;
    border-bottom: 2px solid #f9a8d4;
    line-height: 1.4;
  }

  h2 {
    font-size: 22px;
    font-weight: 700;
    color: #be185d;
    margin: 28px 0 14px 0;
    padding: 8px 0 8px 12px;
    border-left: 4px solid #be185d;
    line-height: 1.4;
  }

  h3 {
    font-size: 18px;
    font-weight: 600;
    color: #db2777;
    margin: 24px 0 12px 0;
    line-height: 1.4;
  }

  h4 {
    font-size: 16px;
    font-weight: 600;
    color: #3d1f2e;
    margin: 20px 0 10px 0;
    line-height: 1.4;
  }

  p {
    font-size: 16px;
    line-height: 1.85;
    color: #3d1f2e;
    margin: 12px 0;
  }

  strong {
    font-weight: 700;
    color: #be185d;
  }

  em {
    font-style: italic;
    color: #7a5068;
  }

  code {
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, Courier, monospace;
    font-size: 14px;
    background: #fce7f3;
    color: #be185d;
    padding: 2px 6px;
    border-radius: 6px;
  }

  pre {
    background: #fce7f3;
    color: #3d1f2e;
    padding: 16px;
    border-radius: 12px;
    overflow-x: auto;
    margin: 16px 0;
    line-height: 1.6;
    border: 1px solid #fbcfe8;
  }

  pre code {
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, Courier, monospace;
    font-size: 14px;
    background: none;
    color: #3d1f2e;
    padding: 0;
    border-radius: 0;
  }

  blockquote {
    border-left: 4px solid #be185d;
    background: #fce7f3;
    margin: 16px 0;
    padding: 12px 16px;
    border-radius: 0 12px 12px 0;
    color: #7a5068;
  }

  blockquote p {
    margin: 8px 0;
    color: #7a5068;
  }

  ul {
    padding-left: 24px;
    margin: 12px 0;
  }

  ol {
    padding-left: 24px;
    margin: 12px 0;
  }

  li {
    font-size: 16px;
    line-height: 1.85;
    color: #3d1f2e;
    margin: 6px 0;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin: 16px 0;
    font-size: 15px;
  }

  thead {
    background: #be185d;
  }

  th {
    background: #be185d;
    color: #ffffff;
    font-weight: 600;
    padding: 10px 14px;
    text-align: left;
    border: 1px solid #be185d;
  }

  td {
    padding: 10px 14px;
    border: 1px solid #fbcfe8;
    color: #3d1f2e;
  }

  tr {
    background: #fdf2f8;
  }

  img {
    max-width: 100%;
    height: auto;
    display: block;
    margin: 24px auto;
    border-radius: 12px;
  }

  a {
    color: #be185d;
    text-decoration: none;
    font-weight: 500;
  }

  hr {
    border: none;
    border-top: 1px solid #fbcfe8;
    margin: 24px 0;
  }

name: "bold-green"
description: "大胆森林绿风格：白底绿色主色，清新自然，适合环保健康和可持续发展内容"
colors:
  primary: "#16a34a"
  secondary: "#22c55e"
  text: "#1a2e1a"
  text_light: "#4a6a4a"
  background: "#ffffff"
  code_bg: "#f0fdf4"
  code_color: "#15803d"
  quote_border: "#16a34a"
  quote_bg: "#f0fdf4"
  border_radius: "8px"
darkmode:
  background: "#0f1a0f"
  text: "#d8e8d8"
  text_light: "#8aaa8a"
  primary: "#4ade80"
  code_bg: "#162816"
  code_color: "#6ee7a0"
  quote_bg: "#142014"
  quote_border: "#4ade80"
base_css: |
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    font-size: 16px;
    line-height: 1.8;
    color: #1a2e1a;
    background: #ffffff;
    max-width: 720px;
    margin: 0 auto;
    padding: 20px;
    word-wrap: break-word;
  }

  h1 {
    font-size: 26px;
    font-weight: 700;
    color: #ffffff;
    margin: 32px 0 16px 0;
    padding: 12px 16px;
    background: #16a34a;
    border-radius: 8px;
    line-height: 1.4;
  }

  h2 {
    font-size: 22px;
    font-weight: 700;
    color: #16a34a;
    margin: 28px 0 14px 0;
    padding: 8px 0 8px 12px;
    border-left: 4px solid #16a34a;
    line-height: 1.4;
  }

  h3 {
    font-size: 18px;
    font-weight: 600;
    color: #15803d;
    margin: 24px 0 12px 0;
    line-height: 1.4;
  }

  h4 {
    font-size: 16px;
    font-weight: 600;
    color: #1a2e1a;
    margin: 20px 0 10px 0;
    line-height: 1.4;
  }

  p {
    font-size: 16px;
    line-height: 1.8;
    color: #1a2e1a;
    margin: 12px 0;
  }

  strong {
    font-weight: 700;
    color: #16a34a;
  }

  em {
    font-style: italic;
    color: #4a6a4a;
  }

  code {
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, Courier, monospace;
    font-size: 14px;
    background: #f0fdf4;
    color: #15803d;
    padding: 2px 6px;
    border-radius: 4px;
  }

  pre {
    background: #f0fdf4;
    color: #1a2e1a;
    padding: 16px;
    border-radius: 8px;
    overflow-x: auto;
    margin: 16px 0;
    line-height: 1.6;
    border: 1px solid #bbf7d0;
  }

  pre code {
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, Courier, monospace;
    font-size: 14px;
    background: none;
    color: #1a2e1a;
    padding: 0;
    border-radius: 0;
  }

  blockquote {
    border-left: 4px solid #16a34a;
    background: #f0fdf4;
    margin: 16px 0;
    padding: 12px 16px;
    border-radius: 0 8px 8px 0;
    color: #1a2e1a;
  }

  blockquote p {
    margin: 8px 0;
    color: #1a2e1a;
  }

  ul {
    padding-left: 24px;
    margin: 12px 0;
  }

  ol {
    padding-left: 24px;
    margin: 12px 0;
  }

  li {
    font-size: 16px;
    line-height: 1.8;
    color: #1a2e1a;
    margin: 6px 0;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin: 16px 0;
    font-size: 15px;
  }

  thead {
    background: #16a34a;
  }

  th {
    background: #16a34a;
    color: #ffffff;
    font-weight: 600;
    padding: 10px 14px;
    text-align: left;
    border: 1px solid #16a34a;
  }

  td {
    padding: 10px 14px;
    border: 1px solid #d1fae5;
    color: #1a2e1a;
  }

  tr {
    background: #ffffff;
  }

  img {
    max-width: 100%;
    height: auto;
    display: block;
    margin: 24px auto;
    border-radius: 8px;
  }

  a {
    color: #16a34a;
    text-decoration: none;
    font-weight: 500;
  }

  hr {
    border: none;
    border-top: 2px solid #d1fae5;
    margin: 24px 0;
  }
